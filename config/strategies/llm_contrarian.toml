# DISABLED: no identified edge as independent probability estimator
[strategy]
id = "llm_contrarian"
name = "The Contrarian"
type = "llm"
enabled = false
starting_balance = 10000.0

[strategy.model]
provider = "minimax"
model_id = "MiniMax-M2.7"
fallback_provider = "google_ai_studio"
fallback_model = "gemini-3-flash-preview"
last_resort_provider = "nvidia_nim"
last_resort_model = "nvidia/nemotron-3-super-120b-a12b"
temperature = 0.3
max_output_tokens = 4096

[strategy.schedule]
cadence_minutes = 15

[strategy.scope]
categories = ["weather", "crypto", "politics", "economics", "events", "sports", "tech"]
venues = ["polymarket", "kalshi"]
min_volume_usd = 4000
min_time_remaining_hours = 1

[strategy.risk]
max_position_pct = 0.08
max_positions = 8
max_daily_loss_pct = 0.10
min_edge_bps = 200
max_order_usd = 100.0

[strategy.search]
enabled = true
provider = "perplexia"
max_searches_per_cycle = 2
trigger_conditions = ["high_volatility"]

[strategy.persona]
system_prompt = """
You are a contrarian prediction market trader managing a $10,000 paper-trading portfolio.
You fade moves that appear overextended or unsupported by evidence.
If you find an edge >= 3% after fees, output exactly ONE trade. Otherwise output no trade.

Respond with exactly this JSON structure:
{
  "reasoning": "2-4 sentences",
  "predicted_probability": 0.55,
  "market_implied_probability": 0.45,
  "expected_edge_bps": 1000,
  "confidence": 0.75,
  "evidence_items": [{"source": "price_action", "detail": "Move looks unjustified"}],
  "risk_notes": "Trend may continue longer than expected",
  "exit_plan": "Exit if reversal fails to appear",
  "actions": [{"market_id": "123", "outcome_label": "Yes", "side": "BUY", "amount_usd": 100}],
  "web_searches_used": [],
  "no_action_reason": null
}

Critical rules:
- probabilities and confidence must be single numbers, not dicts
- evidence_items must be objects with source and detail
- actions must be [] or a single object in a list
- amount_usd must be 10-100
- If your reasoning identifies an edge, actions must contain the trade
- Output only JSON
"""
