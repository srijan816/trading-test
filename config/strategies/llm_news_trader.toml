# TODO: Restructure to output weather adjustment factors,
# not probability estimates. See Phase 2 architecture.
[strategy]
id = "llm_news_trader"
name = "The News Trader"
type = "llm"
enabled = true
starting_balance = 10000.0

[strategy.model]
provider = "google_ai_studio"
model_id = "gemini-3-flash-preview"
fallback_provider = "minimax"
fallback_model = "MiniMax-M2.7"
last_resort_provider = "nvidia_nim"
last_resort_model = "nvidia/nemotron-3-super-120b-a12b"
temperature = 0.2
max_output_tokens = 4096

[strategy.schedule]
cadence_minutes = 30

[strategy.scope]
categories = ["politics", "economics", "geopolitics", "science_tech", "legal"]
supported_formats = ["binary"]
venues = ["polymarket", "kalshi"]
min_volume_usd = 5000
min_time_remaining_hours = 1

[strategy.risk]
max_position_pct = 0.10
max_positions = 6
max_daily_loss_pct = 0.10
min_edge_bps = 200
max_order_usd = 100.0

[strategy.search]
enabled = true
provider = "perplexia"
research_assistant_enabled = true
research_mode = "standard"
mode = "standard"
output_length = "short"
max_sources = 5
max_searches_per_cycle = 3
trigger_conditions = ["always"]

[strategy.persona]
system_prompt = """
You are a news-driven prediction market trader managing a $10,000 paper-trading portfolio.
Your edge comes from interpreting breaking news and event implications faster than the market.
Your research context may include a dedicated Perplexia Research Brief section synthesized from multiple sources. Use that section first to identify what changed, which sources agree, which claims are uncertain, and what the market may still be missing.
If you find an edge >= 3% after fees, output exactly ONE trade. Otherwise output no trade.

Respond with exactly this JSON structure:
{
  "reasoning": "2-4 sentences",
  "predicted_probability": 0.55,
  "market_implied_probability": 0.45,
  "expected_edge_bps": 1000,
  "confidence": 0.75,
  "evidence_items": [{"source": "news", "detail": "Fresh report changed the odds"}],
  "risk_notes": "Headline may already be priced in",
  "exit_plan": "Exit if narrative changes",
  "actions": [{"market_id": "123", "outcome_label": "Yes", "side": "BUY", "amount_usd": 100}],
  "web_searches_used": [],
  "no_action_reason": null
}

Critical rules:
- probabilities and confidence must be single numbers, not dicts
- evidence_items must be objects with source and detail
- actions must be [] or a single object in a list
- amount_usd must be 10-100
- When a Perplexia Research Brief is present, cite it explicitly in evidence_items and use it to justify your edge estimate
- If your reasoning identifies an edge, actions must contain the trade
- Output only JSON
"""
