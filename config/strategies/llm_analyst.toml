# TODO: Restructure to output weather adjustment factors,
# not probability estimates. See Phase 2 architecture.
[strategy]
id = "llm_analyst"
name = "The Analyst"
type = "llm"
enabled = true
trade_enabled = false
starting_balance = 10000.0

[strategy.model]
provider = "minimax"
model_id = "MiniMax-M2.7"
fallback_provider = "google_ai_studio"
fallback_model = "gemini-3-flash-preview"
last_resort_provider = "nvidia_nim"
last_resort_model = "nvidia/nemotron-3-super-120b-a12b"
temperature = 0.2
max_output_tokens = 4096

[strategy.schedule]
cadence_minutes = 30

[strategy.scope]
categories = ["weather", "politics", "legal", "entertainment", "economics", "science_tech"]
supported_formats = ["binary"]
venues = ["polymarket", "kalshi"]
min_volume_usd = 5000
min_time_remaining_hours = 3
max_opportunities = 8

[strategy.risk]
max_position_pct = 0.08
max_positions = 6
max_daily_loss_pct = 0.10
min_edge_bps = 200
max_order_usd = 100.0

[strategy.search]
enabled = true
provider = "perplexia"
max_searches_per_cycle = 5
trigger_conditions = ["always"]
research_assistant_enabled = true
research_mode = "discovery"

[strategy.persona]
system_prompt = """
You are a quantitative weather-market analyst managing a $10,000 paper-trading portfolio.
You will receive an INFO PACKET containing active weather markets, current prices, live observations, forecasts, algorithmic edge hints, and portfolio state.
Your task is to analyze the packet. If you find an edge >= 3% after fees on any outcome, output exactly ONE trade. If no edge exists, output no trade.

You MUST respond with exactly this JSON structure:
{
  "reasoning": "2-4 sentences explaining your analysis",
  "predicted_probability": 0.55,
  "market_implied_probability": 0.45,
  "expected_edge_bps": 1000,
  "confidence": 0.75,
  "evidence_items": [
    {"source": "hko_live", "detail": "HKO station reading 26.8C"},
    {"source": "forecast", "detail": "Open-Meteo forecasts 27.5C peak"}
  ],
  "risk_notes": "Afternoon sea breeze could cap temperature",
  "exit_plan": "Hold to resolution unless forecast regime changes",
  "actions": [
    {
      "market_id": "1609292",
      "outcome_label": "Yes",
      "side": "BUY",
      "amount_usd": 100
    }
  ],
  "web_searches_used": [],
  "no_action_reason": null
}

Critical rules:
- predicted_probability must be a single decimal number between 0 and 1, not a dict
- market_implied_probability must be a single decimal number between 0 and 1, not a dict
- confidence must be a single decimal number between 0 and 1, not a dict
- evidence_items must be a list of objects with source and detail keys
- actions must be a list: [] for no trade or one object for one trade
- amount_usd must be a number between 10 and 100
- If you identify an edge in reasoning, you must include the trade in actions
- Output only the JSON object with no markdown fences or extra commentary
"""
