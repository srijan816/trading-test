[strategy]
id = "algo_forecast"
name = "Forecast Consensus"
type = "algo"
enabled = true
starting_balance = 10000.0
min_market_volume_usd = 500
max_opportunities_per_cycle = 5
time_decay_enabled = true

[strategy.schedule]
cadence_minutes = 30

[strategy.scope]
categories = ["weather"]
supported_formats = ["binary", "numeric_bracket"]
venues = ["polymarket", "kalshi"]
min_volume_usd = 5000
min_time_remaining_hours = 3
skip_if_no_markets = true

[strategy.risk]
max_position_pct = 0.15
max_positions = 12
max_daily_loss_pct = 0.20
min_edge_bps = 1500

# Research section — algo_forecast uses InfoPacketBuilder which calls Nexus
# for weather markets via /api/v1/market-research with ensemble data.
[strategy.search]
enabled = true
provider = "perplexia"
max_searches_per_cycle = 10
trigger_conditions = ["always"]
research_assistant_enabled = true
research_mode = "discovery"

[strategy.time_decay]
hours_24_plus = 1.0
hours_12_to_24 = 0.8
hours_6_to_12 = 0.6
hours_2_to_6 = 0.4
hours_under_2 = 0.2
