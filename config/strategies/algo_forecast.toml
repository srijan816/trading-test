[strategy]
id = "algo_forecast"
name = "Forecast Consensus"
type = "algo"
enabled = true
starting_balance = 10000.0

[strategy.schedule]
cadence_minutes = 30

[strategy.scope]
categories = ["weather"]
supported_formats = ["binary", "numeric_bracket"]
venues = ["polymarket", "kalshi"]
min_volume_usd = 5000
min_time_remaining_hours = 3
skip_if_no_markets = true

[strategy.risk]
max_position_pct = 0.15
max_positions = 12
max_daily_loss_pct = 0.20
min_edge_bps = 1500

# Research section — algo_forecast uses InfoPacketBuilder which calls Nexus
# for weather markets via /api/v1/market-research with ensemble data.
[strategy.search]
enabled = true
provider = "perplexia"
max_searches_per_cycle = 3
trigger_conditions = ["always"]
research_assistant_enabled = true
research_mode = "standard"
